<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Mind &amp; Matter</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #050811;
      --panel: #0d1528;
      --border: rgba(99,179,255,0.16);
      --accent: #38bdf8;
      --accent2: #7c3aed;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background:
        radial-gradient(circle at top, rgba(56,189,248,.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(124,58,237,.12), transparent 35%),
        var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }
    .card {
      width: min(680px, 100%);
      padding: 3rem;
      background: rgba(13,21,40,.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 20px 80px rgba(0,0,0,.45);
      text-align: center;
    }
    .eyebrow {
      display: inline-block;
      margin-bottom: 1rem;
      padding: .3rem .8rem;
      border-radius: 999px;
      border: 1px solid rgba(56,189,248,.25);
      color: var(--accent);
      font-size: .75rem;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 1rem;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 1.1;
    }
    p {
      margin: 0 auto 1.5rem;
      max-width: 46ch;
      color: var(--muted);
      line-height: 1.7;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: .85rem 1.4rem;
      border-radius: 999px;
      text-decoration: none;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">404 Error</div>
    <h1>That page drifted out of orbit.</h1>
    <p>The article or page you requested could not be found. Return to Mind &amp; Matter and continue exploring science, chips, energy, and future technology.</p>
    <a href="/">Back to homepage</a>
  </main>
</body>
</html>
